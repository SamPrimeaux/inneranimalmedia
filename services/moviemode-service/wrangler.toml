name = "moviemode-service"
main = "worker/src/index.js"
compatibility_date = "2026-01-20"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

# Product host — globe landing at /
[[routes]]
pattern = "moviemode.inneranimalmedia.com"
custom_domain = true

# Globe landing + studio static — worker handles /api/* first
[assets]
directory = "./public"
binding = "STATIC"
run_worker_first = ["/health", "/.well-known/*", "/meaux*"]

[ai]
binding = "AI"

[[r2_buckets]]
binding = "ASSETS"
bucket_name = "inneranimalmedia"

[[r2_buckets]]
binding = "ARTIFACTS"
bucket_name = "artifacts"

[[d1_databases]]
binding = "DB"
database_name = "inneranimalmedia-business"
database_id = "cf87b717-d4e2-4cf8-bab0-a81268e32d49"

# Optional: bind IAM session KV (same namespace as inneranimalmedia) for cookie auth.
# [[kv_namespaces]]
# binding = "IAM_SESSION"
# id = "<kv-namespace-id>"

# inneranimalmedia main worker calls this via MOVIEMODE_SERVICE binding (see wrangler.production.toml).

[vars]
ENVIRONMENT = "production"
