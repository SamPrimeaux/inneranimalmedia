name: Deploy Unified IAM Dashboard to GitHub Pages

on:
  push:
    branches: [dev, main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: |
          cd dashboard
          bun install

      - name: Build Dashboard
        run: |
          cd dashboard
          GH_PAGES=true bun run build:vite-only

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/dist


      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
