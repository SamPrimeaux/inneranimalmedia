<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Inner Animal Media</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #050508; color: #E2E8F0; font-family: 'Inter', sans-serif; min-height: 100vh; }
        #globe-canvas { position: fixed; inset: 0; z-index: 0; }
        .auth-layout { position: fixed; inset: 0; z-index: 1; display: flex; align-items: center; justify-content: center; pointer-events: none; }
        .auth-layout .card { pointer-events: auto; }
        .card {
            position: relative; z-index: 10; width: 100%; max-width: 400px; margin: 0 auto; padding: 48px 40px;
            background: rgba(12, 12, 22, 0.18); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 32px;
            box-shadow: 0 20px 50px -12px rgba(0, 0, 0, 0.35), inset 0 1px 0 rgba(255, 255, 255, 0.06);
        }
        .card h1 { font-size: 20px; font-weight: 700; color: white; margin-bottom: 4px; }
        .card .subtitle { font-size: 13px; color: #94A3B8; margin-bottom: 24px; }
        .input-group { width: 100%; margin-bottom: 16px; }
        .input-field {
            width: 100%; background: rgba(0, 0, 0, 0.25); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px; padding: 14px 16px; color: white; font-size: 14px; outline: none;
        }
        .input-field:focus { border-color: #007AFF; background: rgba(0, 0, 0, 0.4); }
        .btn-primary {
            width: 100%; padding: 14px; margin-top: 8px; border-radius: 14px; font-weight: 600; color: white;
            background: #007AFF; border: none; cursor: pointer; font-size: 14px;
        }
        .btn-primary:hover { background: #0062CC; }
        .btn-primary:disabled { opacity: 0.7; cursor: not-allowed; }
        .msg { font-size: 13px; margin-top: 16px; text-align: center; min-height: 20px; }
        .msg.success { color: #10B981; }
        .msg.error { color: #FF3B30; }
        .back-link { display: inline-block; margin-top: 20px; font-size: 14px; color: #007AFF; text-decoration: none; font-weight: 600; }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
<canvas id="globe-canvas"></canvas>
<div class="auth-layout">
    <div class="card">
        <div id="panelRequest" style="display: none;">
            <h1>Forgot Password</h1>
            <p class="subtitle">Enter your email and we'll send you a reset link.</p>
            <form id="formRequest">
                <div class="input-group">
                    <input type="email" id="requestEmail" class="input-field" placeholder="Email Address" required autocomplete="email">
                </div>
                <button type="submit" id="btnRequest" class="btn-primary">Send reset link</button>
            </form>
            <div id="requestMsg" class="msg"></div>
            <a href="/auth-signin.html" class="back-link">Back to sign in</a>
        </div>
        <div id="panelReset" style="display: none;">
            <h1>Set new password</h1>
            <p class="subtitle">Enter your new password below.</p>
            <form id="formReset">
                <input type="hidden" id="resetToken" name="token">
                <div class="input-group">
                    <input type="password" id="newPassword" class="input-field" placeholder="New password" required minlength="8" autocomplete="new-password">
                </div>
                <div class="input-group">
                    <input type="password" id="confirmPassword" class="input-field" placeholder="Confirm password" required minlength="8" autocomplete="new-password">
                </div>
                <button type="submit" id="btnReset" class="btn-primary">Update password</button>
            </form>
            <div id="resetMsg" class="msg"></div>
            <a href="/auth-signin.html" class="back-link">Back to sign in</a>
        </div>
    </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js" nonce="MzQzOTUzODQzLDMxNTk3NDc1NTI="></script>
<script nonce="MzQzOTUzODQzLDMxNTk3NDc1NTI=">
(function() {
    var params = new URLSearchParams(window.location.search);
    var token = params.get('token');
    var panelRequest = document.getElementById('panelRequest');
    var panelReset = document.getElementById('panelReset');
    if (token) {
        panelReset.style.display = 'block';
        document.getElementById('resetToken').value = token;
    } else {
        panelRequest.style.display = 'block';
    }

    document.getElementById('formRequest').addEventListener('submit', async function(e) {
        e.preventDefault();
        var email = document.getElementById('requestEmail').value.trim();
        var btn = document.getElementById('btnRequest');
        var msg = document.getElementById('requestMsg');
        msg.textContent = '';
        msg.className = 'msg';
        btn.disabled = true;
        btn.textContent = 'Sending...';
        try {
            var res = await fetch(window.location.origin + '/api/auth/forgot-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email })
            });
            var data = await res.json().catch(function() { return {}; });
            msg.className = 'msg ' + (data.ok ? 'success' : 'error');
            msg.textContent = data.message || data.error || (res.ok ? 'Check your email for the reset link.' : 'Something went wrong.');
            if (data.ok) msg.textContent = 'If that email is registered, you will receive a reset link.';
        } catch (err) {
            msg.className = 'msg error';
            msg.textContent = 'Network error. Try again.';
        }
        btn.disabled = false;
        btn.textContent = 'Send reset link';
    });

    document.getElementById('formReset').addEventListener('submit', async function(e) {
        e.preventDefault();
        var tokenEl = document.getElementById('resetToken');
        var newPw = document.getElementById('newPassword').value;
        var confirmPw = document.getElementById('confirmPassword').value;
        var msg = document.getElementById('resetMsg');
        var btn = document.getElementById('btnReset');
        msg.textContent = '';
        msg.className = 'msg';
        if (newPw !== confirmPw) {
            msg.className = 'msg error';
            msg.textContent = 'Passwords do not match.';
            return;
        }
        if (newPw.length < 8) {
            msg.className = 'msg error';
            msg.textContent = 'Password must be at least 8 characters.';
            return;
        }
        btn.disabled = true;
        btn.textContent = 'Updating...';
        try {
            var res = await fetch(window.location.origin + '/api/auth/reset-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token: tokenEl.value, password: newPw })
            });
            var data = await res.json().catch(function() { return {}; });
            if (res.ok && data.ok) {
                msg.className = 'msg success';
                msg.textContent = 'Password updated. Redirecting to sign in...';
                setTimeout(function() { window.location.href = '/auth-signin.html'; }, 1500);
                return;
            }
            msg.className = 'msg error';
            msg.textContent = data.error || 'Failed to update password.';
        } catch (err) {
            msg.className = 'msg error';
            msg.textContent = 'Network error. Try again.';
        }
        btn.disabled = false;
        btn.textContent = 'Update password';
    });
})();
</script>
<script nonce="MzQzOTUzODQzLDMxNTk3NDc1NTI=">
(function() {
    var canvas = document.getElementById('globe-canvas');
    if (typeof THREE !== 'undefined') {
        var scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x030308, 0.0012);
        var camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 2000);
        camera.position.set(0, 0, 35);
        var renderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true, antialias: true, powerPreference: 'high-performance' });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        var starGeo = new THREE.BufferGeometry();
        var starCount = 4000;
        var starPos = new Float32Array(starCount * 3);
        for (var i = 0; i < starCount; i++) {
            starPos[i * 3] = (Math.random() - 0.5) * 1200;
            starPos[i * 3 + 1] = (Math.random() - 0.5) * 1200;
            starPos[i * 3 + 2] = (Math.random() - 0.5) * 1200;
        }
        starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
        var starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.8, transparent: true, opacity: 0.9, sizeAttenuation: true });
        scene.add(new THREE.Points(starGeo, starMat));
        var globeGroup = new THREE.Group();
        scene.add(globeGroup);
        var wireGeo = new THREE.IcosahedronGeometry(8.5, 3);
        var wireMat = new THREE.MeshBasicMaterial({ color: 0x38bdf8, wireframe: true, transparent: true, opacity: 0.35 });
        globeGroup.add(new THREE.Mesh(wireGeo, wireMat));
        function animate() {
            requestAnimationFrame(animate);
            globeGroup.rotation.y += 0.002;
            renderer.render(scene, camera);
        }
        animate();
        window.addEventListener('resize', function() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    }
})();
</script>
</body>
</html>
