<!-- CMS section: interactive_systems — hero for /games (ported from /services Interactive systems) -->
<section
  class="py-24 md:py-32 bg-white"
  data-cms-section="interactive_systems"
  data-cms-type="hero"
  data-section-theme="light"
  id="cms-games-sec-hero"
>
  <div class="w-full max-w-screen-xl-tight px-6 mx-auto">
    <div class="text-center mb-16 md:mb-24">
      <h1 class="text-4xl md:text-5xl font-bold text-brand-navy mb-4" id="cms-games-hero-headline">Interactive systems</h1>
      <p class="text-brand-muted text-lg md:text-xl" id="cms-games-hero-subheadline">MeauxGame engine preview.</p>
    </div>

    <div class="relative w-full bg-brand-dark rounded-[32px] overflow-hidden shadow-2xl chess-hero-cover-wrap">
      <picture class="absolute inset-0 w-full h-full flex items-center justify-center">
        <source id="cms-games-hero-mobile-src" media="(max-width: 768px)" srcset="">
        <source id="cms-games-hero-desktop-src" srcset="">
        <img
          id="cms-games-hero-img"
          class="chess-hero-cover"
          src=""
          alt="MeauxChess — 3D multiplayer chess"
          width="1920"
          height="1080"
          loading="eager"
          decoding="async"
        >
      </picture>
      <div class="absolute inset-0 bg-gradient-to-t from-brand-dark/85 via-brand-dark/15 to-transparent pointer-events-none"></div>
      <div class="absolute bottom-8 md:bottom-10 left-8 md:left-10 text-white z-10">
        <h2 class="text-xl md:text-2xl font-bold mb-2" id="cms-games-overlay-title">3D Multiplayer Chess</h2>
        <p class="text-gray-400 text-sm" id="cms-games-overlay-subtitle">Powered by WebSockets &amp; Durable Objects</p>
        <button type="button" class="mt-4 inline-flex items-center gap-2 text-brand-blue font-bold hover:text-white transition-colors" id="cms-games-cta" data-open-play-modal>
          Play Full Game
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"/></svg>
        </button>
      </div>
    </div>
  </div>
</section>
