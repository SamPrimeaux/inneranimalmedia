<!DOCTYPE html>
<html lang="en" data-theme="">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<title>AgentSam CMS · Inner Animal Media</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#F9F7F2;--bg1:#faf8f4;--bg2:#fff;--bg3:#f5f2eb;
    --border:rgba(43,39,31,.1);--border-hi:rgba(43,39,31,.16);
    --text:#1a1a1a;--muted:#64748b;--faint:#94a3b8;
    --blue:#3b82f6;--blue-d:#1d4ed8;--green:#0d9488;--orange:#f97316;--red:#ef4444;
    font-size:13px;
  }
  html,body,#app{
    height:100%;
    height:100dvh;
    height:-webkit-fill-available;
    overflow:hidden;
    background:var(--bg);
    color:var(--text);
    font-family:Inter,-apple-system,BlinkMacSystemFont,sans-serif;
    -webkit-font-smoothing:antialiased;
    -webkit-tap-highlight-color:transparent;
  }
  html.theme-editor-light,html.theme-editor-light body,html.theme-editor-light #app{background:#F9F7F2;color:#1a1a1a}
  .agentsam-cms-loading{display:flex;align-items:center;justify-content:center;height:100%;color:#786f62;font-size:13px;gap:10px}
  .agentsam-cms-loading::before{content:'';width:16px;height:16px;border:2px solid #e8e4dc;border-top-color:#1e6a6f;border-radius:50%;animation:agentsam-spin .7s linear infinite}
  @keyframes agentsam-spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="app"><div class="agentsam-cms-loading">Loading AgentSam CMS…</div></div>
<script src="/static/dashboard/app/cms/vendor/react.production.min.js"></script>
<script src="/static/dashboard/app/cms/vendor/react-dom.production.min.js"></script>
<script src="/static/dashboard/app/cms/vendor/babel.min.js"></script>
<script>
(function(){
  try {
    const p = new URLSearchParams(location.search);
    if (p.get('view') === 'themeEditor') {
      document.documentElement.classList.add('theme-editor-light');
    }
  } catch (_) {}
})();
(function(){
  try{
    const p=window.parent?.document?.documentElement;
    if(!p||p===document.documentElement)return;
    const cs=window.parent.getComputedStyle(p);
    const keys=['--bg-canvas','--bg-app','--bg-panel','--bg-hover','--bg-elevated',
      '--border-subtle','--border-focus','--text-main','--text-muted','--text-heading',
      '--solar-cyan','--solar-orange','--solar-green','--solar-blue','--solar-red',
      '--dashboard-panel','--dashboard-canvas','--dashboard-border'];
    const root=document.documentElement;
    for(const k of keys){const v=cs.getPropertyValue(k).trim();if(v)root.style.setProperty(k,v);}
    const slug=p.getAttribute('data-theme');
    if(slug)root.setAttribute('data-theme',slug);
  }catch(_){}
})();
window.addEventListener('message',function(e){
  const parentOrigin=(function(){try{return new URLSearchParams(location.search).get('parent_origin')||'';}catch(_){return '';}})();
  const allowed=[window.location.origin];
  if(parentOrigin)allowed.push(parentOrigin);
  if(!allowed.includes(e.origin))return;
  const d=e.data;
  if(!d||d.type!=='iam-cms-theme')return;
  try{
    const root=document.documentElement;
    if(d.slug)root.setAttribute('data-theme',d.slug);
    if(d.vars&&typeof d.vars==='object'){
      for(const[k,v]of Object.entries(d.vars)){if(v)root.style.setProperty(k,v);}
    }
  }catch(_){}
});
</script>
<script>
(async function loadAgentSamCmsEditor() {
  const mount = document.getElementById('app');
  const showErr = (msg) => {
    if (!mount) return;
    mount.innerHTML = '<div style="padding:24px;font-family:Inter,sans-serif;color:#181611;max-width:420px">'
      + '<strong style="display:block;margin-bottom:8px">AgentSam CMS failed to load</strong>'
      + '<p style="color:#786f62;font-size:13px;line-height:1.5;margin:0">' + msg + '</p>'
      + '<p style="color:#786f62;font-size:12px;margin:12px 0 0">Try a hard refresh (Cmd+Shift+R) or sign in again.</p></div>';
  };
  try {
    if (!window.React || !window.ReactDOM || !window.Babel) {
      throw new Error('Editor runtime missing (React/Babel).');
    }
    const res = await fetch('/static/dashboard/app/cms/cms-editor-core.js', { credentials: 'same-origin', cache: 'no-store' });
    if (!res.ok) throw new Error('Editor bundle HTTP ' + res.status);
    const code = await res.text();
    if (code.includes('SESSION_MISSING') || code.trimStart().startsWith('{')) {
      throw new Error('Editor bundle was not JavaScript (auth or routing issue).');
    }
    const compiled = window.Babel.transform(code, { presets: ['react'] }).code;
    const s = document.createElement('script');
    s.textContent = compiled;
    document.body.appendChild(s);
  } catch (e) {
    console.error('[AgentSam CMS]', e);
    showErr(e && e.message ? e.message : String(e));
  }
})();
</script>
</body>
</html>
