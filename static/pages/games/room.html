<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Chess room | Inner Animal Media</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
  <style>
    :root { --bg: #050508; --panel: #0f111a; --border: #1e2230; --text: #e2e8f0; --muted: #94a3b8; --accent: #2563eb; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Inter, system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    main { max-width: 960px; margin: 0 auto; padding: 2rem 1rem 3rem; }
    .top { display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 1rem; margin-bottom: 1rem; }
    h1 { font-size: 1.35rem; font-weight: 700; }
    .meta { font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; color: var(--muted); }
    .badge { display: inline-block; padding: 0.25rem 0.6rem; border-radius: 999px; background: #172554; color: #93c5fd; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; }
    #viewport { width: min(92vw, 720px); height: min(92vw, 720px); max-height: 70vh; margin: 0 auto 1rem; border-radius: 0.75rem; overflow: hidden; border: 1px solid var(--border); background: #000; }
    .turn { text-align: center; margin-bottom: 0.75rem; font-size: 0.85rem; }
    .status { text-align: center; color: var(--muted); font-size: 0.85rem; min-height: 1.4em; }
    .actions { display: flex; justify-content: center; gap: 0.75rem; margin-top: 1rem; flex-wrap: wrap; }
    .btn { border: 1px solid var(--border); background: var(--panel); color: var(--text); border-radius: 0.65rem; padding: 0.55rem 1rem; font-size: 0.8rem; font-weight: 600; cursor: pointer; text-decoration: none; }
    .btn:hover { border-color: #334155; }
    .hint { text-align: center; font-size: 0.75rem; color: var(--muted); margin-top: 0.5rem; }
  </style>
</head>
<body>
  <main>
    <div class="top">
      <div>
        <h1>3D Chess</h1>
        <p class="meta" id="room-id"></p>
      </div>
      <span class="badge" id="player-color">connecting…</span>
    </div>
    <p class="turn" id="turn-label"></p>
    <div id="viewport" aria-label="3D chess board"></div>
    <p class="hint">Drag to orbit · Click piece then square to move</p>
    <p class="status" id="status" aria-live="polite"></p>
    <div class="actions">
      <a class="btn" href="/games">← Lobby</a>
      <button type="button" class="btn" id="resign-btn">Resign</button>
    </div>
  </main>
  <script type="module" src="/static/dashboard/app/games-room.js"></script>
</body>
</html>
