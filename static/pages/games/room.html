<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>MeauxChess · MeauxGames</title>
  <meta name="description" content="Live 3D baroque chess on MeauxGames — real-time multiplayer on Inner Animal Media.">
  <meta property="og:title" content="MeauxChess">
  <meta property="og:description" content="Play baroque 3D chess on MeauxGames.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://imagedelivery.net/g7wf09fCONpnidkRnR_5vw/d23ebddd-24ad-4b40-7cd6-0fe759f1f100/medium">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="https://imagedelivery.net/g7wf09fCONpnidkRnR_5vw/d23ebddd-24ad-4b40-7cd6-0fe759f1f100/medium">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #c9a84c;
      --gold-dim: rgba(201, 168, 76, 0.35);
      --cream: #f0e6d0;
      --text: #eef2ff;
      --muted: #8b95a8;
      --amber: #e8821a;
      --border: rgba(201, 168, 76, 0.18);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      position: relative;
      overflow: hidden;
      font-family: Inter, system-ui, sans-serif;
      color: var(--text);
      background: radial-gradient(ellipse 120% 100% at 50% 100%,
        #1a0a04 0%, #0e0905 60%, #050302 100%);
    }
    .game-header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 10;
      pointer-events: none;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 0.65rem;
      padding: 0.65rem 1rem 1.75rem;
      background: linear-gradient(180deg,
        rgba(8, 5, 3, 0.96) 0%,
        rgba(8, 5, 3, 0.55) 55%,
        rgba(8, 5, 3, 0) 100%);
    }
    .player-card {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      padding: 0.4rem 0.55rem;
      border-radius: 0.65rem;
      background: transparent;
      border: 1px solid transparent;
      transition: background 0.2s, border-color 0.2s, box-shadow 0.2s;
      pointer-events: auto;
    }
    .player-card.active-turn {
      background: rgba(201, 168, 76, 0.1);
      border-color: var(--gold-dim);
      box-shadow: 0 0 24px rgba(201, 168, 76, 0.08);
    }
    .player-card.right {
      flex-direction: row-reverse;
      justify-self: end;
      text-align: right;
    }
    .avatar {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.72rem;
      font-weight: 700;
      flex-shrink: 0;
      overflow: hidden;
    }
    .avatar.avatar-squircle {
      width: 52px;
      height: 52px;
      border-radius: 22%;
      padding: 0;
      background: rgba(8, 5, 3, 0.85);
      border: 2px solid var(--gold-dim);
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.45);
    }
    .avatar-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .avatar-fallback {
      display: block;
    }
    .avatar.white {
      background: rgba(204, 255, 238, 0.1);
      border: 2px solid rgba(204, 255, 238, 0.28);
      color: #ccffee;
    }
    .avatar.black {
      background: rgba(232, 130, 26, 0.1);
      border: 2px solid rgba(232, 130, 26, 0.35);
      color: var(--amber);
    }
    .player-info { min-width: 0; }
    .player-name { font-size: 0.86rem; font-weight: 700; line-height: 1.2; color: var(--cream); }
    .player-sub { font-size: 0.62rem; color: var(--muted); margin-top: 0.12rem; }
    .captures {
      display: flex;
      flex-wrap: wrap;
      gap: 0.2rem;
      margin-top: 0.25rem;
      min-height: 18px;
    }
    .captures svg { display: block; opacity: 0.92; }
    .brand-logo {
      display: block;
      width: min(220px, 52vw);
      height: auto;
      margin: 0 auto 0.45rem;
      filter: drop-shadow(0 3px 12px rgba(0, 0, 0, 0.55));
    }
    .timer {
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      font-size: 1.08rem;
      font-weight: 500;
      color: var(--muted);
      min-width: 3.4rem;
    }
    .timer.running { color: var(--gold); }
    .timer.running.low {
      color: #c0392b;
      animation: timer-pulse 0.8s ease-in-out infinite;
    }
    @keyframes timer-pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.55; }
    }
    .center-col { text-align: center; justify-self: center; pointer-events: none; }
    .turn-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.68rem;
      font-weight: 600;
      padding: 0.32rem 0.75rem;
      border-radius: 999px;
      background: rgba(20, 8, 3, 0.72);
      border: 1px solid var(--border);
      color: #b8a882;
    }
    .turn-dot { width: 7px; height: 7px; border-radius: 50%; }
    .dot-white { background: #ccffee; }
    .dot-orange { background: var(--amber); }
    .header-actions {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.55rem;
      padding-top: 0.2rem;
      pointer-events: auto;
    }
    .room-meta {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.58rem;
      color: var(--muted);
      letter-spacing: 0.04em;
    }
    .btn {
      border: 1px solid var(--border);
      background: rgba(20, 8, 3, 0.82);
      color: #b8a882;
      border-radius: 0.45rem;
      padding: 0.38rem 0.72rem;
      font-size: 0.68rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn:hover { border-color: var(--gold); color: var(--gold); }
    .btn-resign { color: #f87171; border-color: rgba(248, 113, 113, 0.35); }
    .btn-resign:hover { color: #fca5a5; border-color: rgba(248, 113, 113, 0.55); }
    .game-stage {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: radial-gradient(ellipse 90% 70% at 50% 38%, #120a06 0%, #050302 72%);
    }
    #viewport { position: absolute; inset: 0; touch-action: manipulation; z-index: 1; cursor: pointer; }
    #loading-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      background:
        radial-gradient(ellipse 70% 55% at 50% 42%, rgba(201, 168, 76, 0.07), transparent 68%),
        linear-gradient(rgba(5, 3, 2, 0.94), rgba(5, 3, 2, 0.98));
      z-index: 10;
      transition: opacity 0.45s;
    }
    #loading-overlay.hidden { opacity: 0; pointer-events: none; }
    .load-label {
      font-size: 0.76rem;
      color: #b8a882;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .load-track {
      width: min(260px, 62vw);
      height: 4px;
      background: rgba(201, 168, 76, 0.12);
      border-radius: 999px;
      overflow: hidden;
    }
    #load-progress {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #8b6914, var(--gold), #f0e6d0);
      transition: width 0.2s;
    }
    .status-bar {
      position: fixed;
      bottom: 1rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      pointer-events: none;
      background: rgba(20, 8, 3, 0.88);
      border: 1px solid var(--gold-dim);
      border-radius: 999px;
      padding: 0.45rem 1.35rem;
      font-size: 0.72rem;
      color: #b8a882;
      white-space: nowrap;
      text-align: center;
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.35);
    }
    @media (max-width: 480px) {
      .game-header { grid-template-columns: 1fr; gap: 0.4rem; padding-bottom: 1.25rem; }
      .player-card.right { justify-self: stretch; flex-direction: row; text-align: left; }
      .center-col { order: -1; }
      .avatar, .avatar.avatar-squircle { width: 44px; height: 44px; }
      .timer { font-size: 0.95rem; }
      .brand-logo { width: min(180px, 70vw); }
    }
    /* You card — iOS icon squircle */
    .avatar-squircle.white {
      background: transparent;
      border: none;
      padding: 0;
      color: var(--cream);
    }
    .avatar-initials {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: inherit;
    }
    /* Agent Sam card — icon only, no border */
    .avatar.black.avatar-squircle {
      background: transparent;
      border: none;
      box-shadow: none;
    }
    /* Agent Sam name below icon */
    .agent-sam-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.2rem;
      flex-shrink: 0;
    }
    .agent-sam-label {
      font-size: 0.58rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: var(--muted);
      text-transform: uppercase;
      white-space: nowrap;
    }
    /* Back breadcrumb */
    .back-btn {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.65rem;
      font-weight: 600;
      color: var(--muted);
      text-decoration: none;
      padding: 0.25rem 0.5rem;
      border-radius: 0.4rem;
      transition: color 0.15s, background 0.15s;
      pointer-events: auto;
    }
    .back-btn:hover { color: var(--cream); background: rgba(255,255,255,0.05); }
    .back-btn svg { flex-shrink: 0; }
    /* Logo — no background bleed */
    .brand-logo {
      background: transparent;
    }
    .brand-logo-header {
      display: block;
      width: min(200px, 44vw);
      height: auto;
      margin: 0 auto 0.45rem;
    }
    .brand-logo-loading {
      display: block;
      width: min(260px, 56vw);
      height: auto;
      border-radius: 0.5rem;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <header class="game-header">
    <div class="player-card active-turn" id="card-white">
      <a class="back-btn" href="/games" aria-label="Back to lobby">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M9 11L5 7L9 3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Lobby
      </a>
      <div class="avatar avatar-squircle white" id="avatar-white">
        <img
          class="avatar-img"
          src="https://imagedelivery.net/g7wf09fCONpnidkRnR_5vw/e5327954-d123-4a7a-2138-589146758b00/avatar"
          alt="You"
          width="52"
          height="52"
        />
      </div>
      <div class="player-info">
        <div class="player-name" id="name-white">You</div>
        <div class="player-sub" id="sub-white">You are white</div>
        <div class="captures" id="captures-white" aria-label="Pieces you captured"></div>
      </div>
      <span class="timer running" id="timer-white">10:00</span>
    </div>

    <div class="center-col">
      <img
        class="brand-logo brand-logo-header"
        src="https://imagedelivery.net/g7wf09fCONpnidkRnR_5vw/c91fe649-a19a-4183-08a8-b05883aafe00/public"
        alt="MeauxGames"
        width="200"
        height="58"
      />
      <div class="turn-pill" id="turn-pill"><span class="turn-dot dot-white"></span> White to move</div>
    </div>

    <div class="player-card right" id="card-black">
      <span class="timer" id="timer-black">10:00</span>
      <div class="player-info" style="text-align:right;">
        <div class="player-name" id="name-black">Agent Sam</div>
        <div class="captures" id="captures-black" aria-label="Pieces opponent captured"></div>
      </div>
      <div class="agent-sam-col">
        <div class="avatar black avatar-squircle" id="avatar-black">
          <img
            class="avatar-img"
            id="avatar-black-img"
            src="https://imagedelivery.net/g7wf09fCONpnidkRnR_5vw/b5557284-485e-4305-2c5a-49c6acf99a00/thumbnail"
            alt="Agent Sam"
            width="52"
            height="52"
          />
          <span class="avatar-fallback" id="avatar-black-fallback" hidden>AS</span>
        </div>
        <span class="agent-sam-label">Agent Sam</span>
      </div>
    </div>

    <div class="header-actions">
      <span class="room-meta" id="room-id-short">…</span>
      <button type="button" class="btn btn-resign" id="resign-btn">Resign</button>
    </div>
  </header>

  <div class="game-stage">
    <div id="viewport" aria-label="3D chess board"></div>
    <div id="loading-overlay">
      <img
        class="brand-logo brand-logo-loading"
        src="https://imagedelivery.net/g7wf09fCONpnidkRnR_5vw/c91fe649-a19a-4183-08a8-b05883aafe00/public"
        alt="MeauxGames"
        width="260"
        height="76"
      />
      <p class="load-label">Loading baroque board &amp; pieces…</p>
      <div class="load-track"><div id="load-progress"></div></div>
    </div>
  </div>

  <p class="status-bar" id="status-bar" aria-live="polite">Connecting…</p>

  <script type="module" src="/static/dashboard/app/games-room.js"></script>
</body>
</html>
