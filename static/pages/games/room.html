<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>MeauxChess</title>
  <meta name="description" content="Live 3D chess room — real-time multiplayer on Cloudflare Durable Objects.">
  <meta property="og:title" content="MeauxChess">
  <meta property="og:description" content="Join a live 3D chess room on Inner Animal Media.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://imagedelivery.net/g7wf09fCONpnidkRnR_5vw/1b7ecfe9-550c-4ef7-966c-9e1972e29800/hero">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="https://imagedelivery.net/g7wf09fCONpnidkRnR_5vw/1b7ecfe9-550c-4ef7-966c-9e1972e29800/hero">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bar: rgba(10, 10, 15, 0.94);
      --border: rgba(255, 255, 255, 0.08);
      --text: #eef2ff;
      --muted: #8b95a8;
      --teal: #00ffcc;
      --amber: #e8821a;
      --green: #22ff88;
      --red: #ff4444;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: Inter, system-ui, sans-serif;
      color: var(--text);
      display: flex;
      flex-direction: column;
      background: #0a0a0f;
    }
    .game-header {
      flex-shrink: 0;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 0.5rem;
      padding: 0.55rem 0.75rem;
      background: var(--bar);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(12px);
    }
    .player-card {
      display: flex;
      align-items: center;
      gap: 0.55rem;
      padding: 0.35rem 0.5rem;
      border-radius: 0.65rem;
      border: 1px solid transparent;
      transition: background 0.2s, border-color 0.2s;
    }
    .player-card.active-turn {
      background: rgba(255, 255, 255, 0.06);
      border-color: rgba(255, 255, 255, 0.12);
    }
    .player-card.right {
      flex-direction: row-reverse;
      justify-self: end;
      text-align: right;
    }
    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.65rem;
      font-weight: 700;
      flex-shrink: 0;
    }
    .avatar.white {
      background: rgba(204, 255, 238, 0.12);
      border: 1px solid rgba(204, 255, 238, 0.35);
      color: #ccffee;
    }
    .avatar.black {
      background: rgba(232, 130, 26, 0.12);
      border: 1px solid rgba(232, 130, 26, 0.4);
      color: var(--amber);
    }
    .player-info { min-width: 0; }
    .player-name { font-size: 0.82rem; font-weight: 600; line-height: 1.2; }
    .player-sub { font-size: 0.62rem; color: var(--muted); margin-top: 0.1rem; }
    .captures {
      display: flex;
      flex-wrap: wrap;
      gap: 0.2rem;
      margin-top: 0.25rem;
      min-height: 18px;
    }
    .captures svg { display: block; opacity: 0.92; }
    .brand-mark {
      font-size: 0.58rem;
      font-weight: 800;
      letter-spacing: 0.28em;
      color: var(--teal);
      margin-bottom: 0.2rem;
    }
    .timer {
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      font-size: 1.05rem;
      font-weight: 500;
      color: var(--muted);
      min-width: 3.2rem;
    }
    .timer.running { color: var(--green); }
    .timer.running.low { color: var(--red); }
    .center-col { text-align: center; justify-self: center; }
    .turn-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.68rem;
      font-weight: 600;
      padding: 0.3rem 0.65rem;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
    }
    .turn-dot { width: 7px; height: 7px; border-radius: 50%; }
    .dot-white { background: #ccffee; }
    .dot-orange { background: var(--amber); }
    .header-actions {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding-top: 0.15rem;
    }
    .room-meta {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.6rem;
      color: var(--muted);
    }
    .btn {
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
      border-radius: 0.45rem;
      padding: 0.35rem 0.65rem;
      font-size: 0.68rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
    }
    .btn-resign { color: #f87171; border-color: rgba(248, 113, 113, 0.35); }
    .game-stage {
      flex: 1;
      min-height: 0;
      position: relative;
      background: radial-gradient(ellipse 90% 70% at 50% 45%, #1a1a2e 0%, #0a0a0f 72%);
    }
    #viewport { position: absolute; inset: 0; touch-action: manipulation; }
    #loading-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background:
        linear-gradient(rgba(8, 8, 12, 0.88), rgba(8, 8, 12, 0.92)),
        url('https://imagedelivery.net/g7wf09fCONpnidkRnR_5vw/1b7ecfe9-550c-4ef7-966c-9e1972e29800/hero') center / contain no-repeat;
      z-index: 10;
      transition: opacity 0.4s;
    }
    #loading-overlay.hidden { opacity: 0; pointer-events: none; }
    .load-label { font-size: 0.78rem; color: var(--muted); margin-bottom: 0.75rem; }
    .load-track {
      width: min(240px, 60vw);
      height: 4px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 999px;
      overflow: hidden;
    }
    #load-progress {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--teal), var(--amber));
      transition: width 0.2s;
    }
    .status-bar {
      flex-shrink: 0;
      text-align: center;
      font-size: 0.68rem;
      color: var(--muted);
      padding: 0.45rem 0.75rem 0.55rem;
      background: var(--bar);
      border-top: 1px solid var(--border);
    }
    @media (max-width: 480px) {
      .game-header {
        grid-template-columns: 1fr;
        gap: 0.35rem;
      }
      .player-card.right { justify-self: stretch; flex-direction: row; text-align: left; }
      .center-col { order: -1; }
      .avatar { width: 28px; height: 28px; font-size: 0.58rem; }
      .timer { font-size: 0.95rem; }
    }
  </style>
</head>
<body>
  <header class="game-header">
    <div class="player-card active-turn" id="card-white">
      <div class="avatar white" id="avatar-white">W</div>
      <div class="player-info">
        <div class="player-name" id="name-white">You</div>
        <div class="player-sub" id="sub-white">You are white</div>
        <div class="captures" id="captures-white" aria-label="Pieces you captured"></div>
      </div>
      <span class="timer running" id="timer-white">10:00</span>
    </div>

    <div class="center-col">
      <div class="brand-mark">MEAUXCHESS</div>
      <div class="turn-pill" id="turn-pill"><span class="turn-dot dot-white"></span> White to move</div>
    </div>

    <div class="player-card right" id="card-black">
      <span class="timer" id="timer-black">10:00</span>
      <div class="player-info">
        <div class="player-name" id="name-black">Agent Sam</div>
        <div class="player-sub" id="sub-black">Orange</div>
        <div class="captures" id="captures-black" aria-label="Pieces opponent captured"></div>
      </div>
      <div class="avatar black" id="avatar-black">O</div>
    </div>

    <div class="header-actions">
      <span class="room-meta" id="room-id-short">…</span>
      <a class="btn" href="/games">Lobby</a>
      <button type="button" class="btn btn-resign" id="resign-btn">Resign</button>
    </div>
  </header>

  <div class="game-stage">
    <div id="viewport" aria-label="3D chess board"></div>
    <div id="loading-overlay">
      <p class="load-label">Loading pieces…</p>
      <div class="load-track"><div id="load-progress"></div></div>
    </div>
  </div>

  <p class="status-bar" id="status-bar" aria-live="polite">Connecting…</p>

  <script type="module" src="/static/dashboard/app/games-room.js"></script>
</body>
</html>
