<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>MeauxChess</title>
  <meta name="description" content="Live 3D chess room — real-time multiplayer on Cloudflare Durable Objects.">
  <meta property="og:title" content="MeauxChess">
  <meta property="og:description" content="Join a live 3D chess room on Inner Animal Media.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://imagedelivery.net/g7wf09fCONpnidkRnR_5vw/1b7ecfe9-550c-4ef7-966c-9e1972e29800/hero">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="https://imagedelivery.net/g7wf09fCONpnidkRnR_5vw/1b7ecfe9-550c-4ef7-966c-9e1972e29800/hero">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bar: rgba(10, 10, 15, 0.94);
      --border: rgba(255, 255, 255, 0.08);
      --text: #eef2ff;
      --muted: #8b95a8;
      --teal: #00ffcc;
      --amber: #e8821a;
      --green: #22ff88;
      --red: #ff4444;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      position: relative;
      overflow: hidden;
      font-family: Inter, system-ui, sans-serif;
      color: var(--text);
      background: radial-gradient(ellipse 120% 100% at 50% 100%,
        #1a0a04 0%, #0e0905 60%, #050302 100%);
    }
    .game-header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 10;
      pointer-events: none;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 0.5rem;
      padding: 0.55rem 0.75rem;
      padding-bottom: 1.5rem;
      background: linear-gradient(180deg,
        rgba(14, 9, 5, 0.95) 0%,
        rgba(14, 9, 5, 0.0) 100%);
      border-bottom: none;
      backdrop-filter: none;
    }
    .player-card {
      display: flex;
      align-items: center;
      gap: 0.55rem;
      padding: 0.35rem 0.5rem;
      border-radius: 0.65rem;
      background: transparent;
      border: none;
      transition: background 0.2s, border-color 0.2s;
    }
    .player-card.active-turn {
      background: rgba(201, 168, 76, 0.08);
      border: 1px solid rgba(201, 168, 76, 0.3);
      border-radius: 0.5rem;
    }
    .player-card.right {
      flex-direction: row-reverse;
      justify-self: end;
      text-align: right;
    }
    .avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.65rem;
      font-weight: 700;
      flex-shrink: 0;
      overflow: hidden;
    }
    .avatar.avatar-squircle {
      border-radius: 22%;
      padding: 0;
      border-width: 2px;
    }
    .avatar-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .avatar.white {
      background: rgba(204, 255, 238, 0.12);
      border: 1px solid rgba(204, 255, 238, 0.35);
      color: #ccffee;
    }
    .avatar.black {
      background: rgba(232, 130, 26, 0.12);
      border: 1px solid rgba(232, 130, 26, 0.4);
      color: var(--amber);
    }
    .player-info { min-width: 0; }
    .player-name { font-size: 0.82rem; font-weight: 600; line-height: 1.2; }
    .player-sub { font-size: 0.62rem; color: var(--muted); margin-top: 0.1rem; }
    .captures {
      display: flex;
      flex-wrap: wrap;
      gap: 0.2rem;
      margin-top: 0.25rem;
      min-height: 18px;
    }
    .captures svg { display: block; opacity: 0.92; }
    .brand-logo {
      display: block;
      width: min(168px, 42vw);
      height: auto;
      margin: 0 auto 0.35rem;
      filter: drop-shadow(0 2px 8px rgba(0, 0, 0, 0.45));
    }
    .timer {
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      font-size: 1.05rem;
      font-weight: 500;
      color: var(--muted);
      min-width: 3.2rem;
    }
    .timer.running { color: #c9a84c; }
    .timer.running.low {
      color: #c0392b;
      animation: timer-pulse 0.8s ease-in-out infinite;
    }
    @keyframes timer-pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.55; }
    }
    .center-col { text-align: center; justify-self: center; }
    .turn-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.68rem;
      font-weight: 600;
      padding: 0.3rem 0.65rem;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
    }
    .turn-dot { width: 7px; height: 7px; border-radius: 50%; }
    .dot-white { background: #ccffee; }
    .dot-orange { background: var(--amber); }
    .header-actions {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding-top: 0.15rem;
      pointer-events: auto;
    }
    .room-meta {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.6rem;
      color: var(--muted);
    }
    .btn {
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
      border-radius: 0.45rem;
      padding: 0.35rem 0.65rem;
      font-size: 0.68rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
    }
    .btn-resign { color: #f87171; border-color: rgba(248, 113, 113, 0.35); }
    .game-stage {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: radial-gradient(ellipse 85% 65% at 50% 42%, #1c1410 0%, #08080c 78%);
    }
    #viewport { position: absolute; inset: 0; touch-action: manipulation; z-index: 1; }
    #loading-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      background:
        linear-gradient(rgba(8, 8, 12, 0.92), rgba(8, 8, 12, 0.96)),
        radial-gradient(ellipse 80% 60% at 50% 40%, rgba(201, 168, 76, 0.08), transparent 70%);
      z-index: 10;
      transition: opacity 0.4s;
    }
    #loading-overlay.hidden { opacity: 0; pointer-events: none; }
    .load-label { font-size: 0.78rem; color: var(--muted); margin-bottom: 0.75rem; }
    .load-track {
      width: min(240px, 60vw);
      height: 4px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 999px;
      overflow: hidden;
    }
    #load-progress {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--teal), var(--amber));
      transition: width 0.2s;
    }
    .status-bar {
      position: fixed;
      bottom: 1rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      pointer-events: none;
      background: rgba(20, 8, 3, 0.85);
      border: 1px solid rgba(201, 168, 76, 0.3);
      border-radius: 999px;
      padding: 0.4rem 1.2rem;
      font-size: 0.7rem;
      color: #b8a882;
      white-space: nowrap;
      text-align: center;
    }
    @media (max-width: 480px) {
      .game-header {
        grid-template-columns: 1fr;
        gap: 0.35rem;
      }
      .player-card.right { justify-self: stretch; flex-direction: row; text-align: left; }
      .center-col { order: -1; }
      .avatar { width: 28px; height: 28px; font-size: 0.58rem; }
      .timer { font-size: 0.95rem; }
    }
  </style>
</head>
<body>
  <header class="game-header">
    <div class="player-card active-turn" id="card-white">
      <div class="avatar white" id="avatar-white">W</div>
      <div class="player-info">
        <div class="player-name" id="name-white">You</div>
        <div class="player-sub" id="sub-white">You are white</div>
        <div class="captures" id="captures-white" aria-label="Pieces you captured"></div>
      </div>
      <span class="timer running" id="timer-white">10:00</span>
    </div>

    <div class="center-col">
      <img
        class="brand-logo"
        src="https://imagedelivery.net/g7wf09fCONpnidkRnR_5vw/d23ebddd-24ad-4b40-7cd6-0fe759f1f100/medium"
        alt="MeauxGames"
        width="168"
        height="48"
      />
      <div class="turn-pill" id="turn-pill"><span class="turn-dot dot-white"></span> White to move</div>
    </div>

    <div class="player-card right" id="card-black">
      <span class="timer" id="timer-black">10:00</span>
      <div class="player-info">
        <div class="player-name" id="name-black">Agent Sam</div>
        <div class="player-sub" id="sub-black">Orange</div>
        <div class="captures" id="captures-black" aria-label="Pieces opponent captured"></div>
      </div>
      <div class="avatar black" id="avatar-black">
        <img
          class="avatar-img"
          id="avatar-black-img"
          src=""
          alt=""
          width="44"
          height="44"
          hidden
        />
      </div>
    </div>

    <div class="header-actions">
      <span class="room-meta" id="room-id-short">…</span>
      <a class="btn" href="/games">Lobby</a>
      <button type="button" class="btn btn-resign" id="resign-btn">Resign</button>
    </div>
  </header>

  <div class="game-stage">
    <div id="viewport" aria-label="3D chess board"></div>
    <div id="loading-overlay">
      <img
        class="brand-logo"
        src="https://imagedelivery.net/g7wf09fCONpnidkRnR_5vw/d23ebddd-24ad-4b40-7cd6-0fe759f1f100/medium"
        alt="MeauxGames"
        width="168"
        height="48"
      />
      <p class="load-label">Loading baroque board &amp; pieces…</p>
      <div class="load-track"><div id="load-progress"></div></div>
    </div>
  </div>

  <p class="status-bar" id="status-bar" aria-live="polite">Connecting…</p>

  <script type="module" src="/static/dashboard/app/games-room.js"></script>
</body>
</html>
