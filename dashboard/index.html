<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- 
      Inline theme bootstrap — runs before first paint to avoid flash.
      Reads CSS vars and dark/light preference from localStorage,
      applies them to :root immediately.
    -->
    <script>
      (function () {
        var K_CSS  = 'inneranimalmedia_theme_css';
        var K_DARK = 'inneranimalmedia_theme_is_dark';
        try {
          var d = localStorage.getItem(K_DARK);
          if (d === '1' || d === '0') {
            document.documentElement.setAttribute('data-theme', d === '1' ? 'dark' : 'light');
          }
          var raw = localStorage.getItem(K_CSS);
          if (!raw) return;
          var vars = JSON.parse(raw);
          if (!vars || typeof vars !== 'object') return;
          var root = document.documentElement;
          Object.keys(vars).forEach(function (k) {
            if (vars[k] != null) root.style.setProperty(k, String(vars[k]));
          });
        } catch (e) {}
      })();
    </script>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Inner Animal Media — Agent Dashboard" />

    <!-- Title driven by Vite env var — never hardcoded -->
    <title>%VITE_PRODUCT_LABEL%</title>

    <!-- Preconnects -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://inneranimalmedia.com" crossorigin />
    <link rel="dns-prefetch" href="https://inneranimalmedia.com" />

    <!-- Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Nunito:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Dashboard shell layout vars -->
    <link rel="stylesheet" href="/static/dashboard/shell.css" />

    <!-- 
      Tailwind is bundled via Vite — no CDN script.
      CDN copy caused duplicate React instance (minified error #525).
    -->

    <style>
      *, *::before, *::after {
        box-sizing: border-box;
      }

      html, body, #root {
        height: 100%;
        margin: 0;
        padding: 0;
      }

      body {
        overflow: hidden;
        font-family: var(--font-sans, 'Nunito', system-ui, -apple-system, sans-serif);
        background-color: var(--bg-app, #0a1a1f);
        color: var(--text-main, #9cb5bc);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      /* Prevent flash of unstyled content before theme loads */
      #root:empty {
        background-color: var(--bg-app, #0a1a1f);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
