
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function () {
        var LAST_WS = 'inneranimalmedia_theme_last_ws';
        var lastWs = localStorage.getItem(LAST_WS);
        var K_CSS =
          lastWs && lastWs.trim()
            ? 'inneranimalmedia_theme_css:' + lastWs.trim()
            : 'inneranimalmedia_theme_css';
        var K_DARK =
          lastWs && lastWs.trim()
            ? 'inneranimalmedia_theme_is_dark:' + lastWs.trim()
            : 'inneranimalmedia_theme_is_dark';
        var K_SLUG =
          lastWs && lastWs.trim()
            ? 'inneranimalmedia_theme_slug:' + lastWs.trim()
            : 'inneranimalmedia_theme_slug';
        var K_MONACO =
          lastWs && lastWs.trim()
            ? 'inneranimalmedia_theme_monaco:' + lastWs.trim()
            : 'inneranimalmedia_theme_monaco';
        var K_MONACO_DATA =
          lastWs && lastWs.trim()
            ? 'inneranimalmedia_theme_monaco_data:' + lastWs.trim()
            : 'inneranimalmedia_theme_monaco_data';
        var K_MONACO_BG =
          lastWs && lastWs.trim()
            ? 'inneranimalmedia_theme_monaco_bg:' + lastWs.trim()
            : 'inneranimalmedia_theme_monaco_bg';
        var L_CSS = 'mcad_theme_css';
        var L_DARK = 'mcad_theme_is_dark';
        try {
          if (!localStorage.getItem(K_CSS) && localStorage.getItem(L_CSS)) {
            localStorage.setItem(K_CSS, localStorage.getItem(L_CSS));
            localStorage.removeItem(L_CSS);
          }
          var d = localStorage.getItem(K_DARK);
          if (d !== '1' && d !== '0') {
            var ld = localStorage.getItem(L_DARK);
            if (ld === '1' || ld === '0') {
              localStorage.setItem(K_DARK, ld);
              localStorage.removeItem(L_DARK);
              d = ld;
            }
          }
          if (d === '1' || d === '0') {
            document.documentElement.setAttribute('data-theme', d === '1' ? 'dark' : 'light');
          }
          var raw = localStorage.getItem(K_CSS);
          if (!raw) return;
          var vars = JSON.parse(raw);
          if (!vars || typeof vars !== 'object') return;
          var root = document.documentElement;
          Object.keys(vars).forEach(function (k) {
            if (vars[k] != null) root.style.setProperty(k, String(vars[k]));
          });
          root.setAttribute('data-dashboard-theme-ready', 'true');
          var slug = localStorage.getItem(K_SLUG);
          if (slug) root.setAttribute('data-cms-theme', slug);
          var mt = localStorage.getItem(K_MONACO);
          var md = localStorage.getItem(K_MONACO_DATA);
          var mb = localStorage.getItem(K_MONACO_BG);
          if (mt && md && mb) {
            root.setAttribute('data-monaco-theme', mt);
            root.setAttribute('data-monaco-theme-data', md);
            root.setAttribute('data-monaco-bg', mb);
          }
        } catch (e) {}
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inner Animal Media — Agent Dashboard</title>
    <link rel="preconnect" href="https://inneranimalmedia.com" crossorigin />
    <link rel="dns-prefetch" href="https://inneranimalmedia.com" />
    <!-- Inner Animal Media dashboard shell (layout vars; safe alongside app CSS) -->
    <link rel="stylesheet" href="/static/dashboard/shell.css" />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/webrtc-adapter/8.1.2/adapter.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        font-family: system-ui, -apple-system, sans-serif;
        background-color: var(--dashboard-canvas, var(--bg-app));
        color: var(--dashboard-text, var(--text-main));
      }
    </style>
    <!-- No importmap: bare-specifier maps to CDN caused a second React copy at runtime (minified error #525) alongside the Vite bundle. -->
<link rel="stylesheet" href="/index.css?v=1.2.0-1775750920551">
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/dashboard/shell.css">
</head>
