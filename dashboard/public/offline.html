<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline — Inner Animal Media</title>
    <link rel="stylesheet" href="/static/dashboard/shell.css" />
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        font-family: Nunito, system-ui, sans-serif;
        background: var(--bg-app, #00212b);
        color: var(--text-main, #9cb5bc);
      }
      .card {
        max-width: 420px;
        padding: 28px 24px;
        border-radius: 12px;
        border: 1px solid var(--border-subtle, #1e3e4a);
        background: var(--bg-panel, #0a2d38);
        text-align: center;
      }
      h1 {
        margin: 0 0 10px;
        font-size: 20px;
        color: var(--text-heading, #b0ccd2);
      }
      p {
        margin: 0 0 16px;
        line-height: 1.5;
        font-size: 14px;
      }
      button {
        border: 1px solid rgba(45, 212, 191, 0.45);
        background: rgba(45, 212, 191, 0.12);
        color: inherit;
        border-radius: 8px;
        padding: 10px 16px;
        font: inherit;
        font-weight: 600;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>You are offline</h1>
      <p>Inner Animal Media shell is cached on this device. Live Agent Sam, APIs, and meetings need a connection.</p>
      <button type="button" onclick="location.reload()">Try again</button>
    </div>
  </body>
</html>
