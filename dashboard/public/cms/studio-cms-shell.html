<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<title>Studio CMS · Inner Animal Media</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body,#app{
    height:100%;height:100dvh;overflow:hidden;
    background:#F9F7F2;color:#1a1a1a;
    font-family:Inter,ui-sans-serif,system-ui,sans-serif;
  }
  .boot{
    min-height:100%;display:grid;place-items:center;gap:10px;
    color:#64748b;font-size:13px;
  }
  .boot strong{color:#1a1a1a;font-size:14px}
</style>
</head>
<body>
<div id="app">
  <div class="boot" aria-busy="true">
    <strong>Loading Studio CMS…</strong>
    <span>Isolated editor bundle (own React)</span>
  </div>
</div>
<script type="module" src="/static/dashboard/app/cms/studio-cms.js"></script>
<script>
(function () {
  const mount = document.getElementById('app');
  const showErr = (msg) => {
    if (!mount) return;
    mount.innerHTML = '<div style="padding:24px;font-family:Inter,sans-serif;color:#f4f4f8;max-width:440px">'
      + '<strong style="display:block;margin-bottom:8px">Studio CMS failed to load</strong>'
      + '<p style="color:#a1a1aa;font-size:13px;line-height:1.5;margin:0">' + msg + '</p>'
      + '<p style="color:#71717a;font-size:12px;margin:12px 0 0">Hard refresh (Cmd+Shift+R) after deploy.</p></div>';
  };
  window.addEventListener('error', (e) => {
    const src = e.filename || '';
    if (src.includes('studio-cms')) {
      console.error('[Studio CMS]', e.error || e.message);
      showErr(e.message || 'Editor bundle failed to load.');
    }
  }, true);
  window.addEventListener('unhandledrejection', (e) => {
    console.error('[Studio CMS]', e.reason);
    showErr(e.reason && e.reason.message ? e.reason.message : String(e.reason));
  });
})();
</script>
</body>
</html>
