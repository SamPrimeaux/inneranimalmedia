<!DOCTYPE html>
<html lang="en" data-theme="">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<title>AgentSam CMS · Inner Animal Media</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#F9F7F2;--bg1:#faf8f4;--bg2:#fff;--bg3:#f5f2eb;
    --border:rgba(43,39,31,.1);--border-hi:rgba(43,39,31,.16);
    --text:#1a1a1a;--muted:#64748b;--faint:#94a3b8;
    --teal:#1e6a6f;--sk:#e8e4dc;--sk-hi:#ddd8ce;
    font-size:13px;
  }
  html,body,#app{
    height:100%;height:100dvh;height:-webkit-fill-available;
    overflow:hidden;background:var(--bg);color:var(--text);
    font-family:Inter,-apple-system,BlinkMacSystemFont,sans-serif;
    -webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent;
  }
  html.theme-editor-light,html.theme-editor-light body,html.theme-editor-light #app{background:#F9F7F2;color:#1a1a1a}

  @keyframes sk-pulse{0%,100%{opacity:1}50%{opacity:.45}}
  @keyframes sk-shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
  .sk-shimmer{
    background:linear-gradient(90deg,var(--sk) 0%,var(--sk-hi) 50%,var(--sk) 100%);
    background-size:200% 100%;animation:sk-shimmer 1.4s ease-in-out infinite;
  }
  .sk-pulse{animation:sk-pulse 1.2s ease-in-out infinite}

  .cms-sk-shell{display:flex;flex-direction:column;height:100%;min-height:0}
  .cms-sk-topbar{
    height:48px;flex-shrink:0;display:flex;align-items:center;gap:10px;
    padding:0 14px;border-bottom:1px solid var(--border);background:#fff;
  }
  .cms-sk-topbar .sk-bar{height:10px;border-radius:4px}
  .cms-sk-body{display:flex;flex:1;min-height:0}
  .cms-sk-rail{
    width:240px;flex-shrink:0;border-right:1px solid var(--border);background:#fff;
    padding:12px 10px;display:flex;flex-direction:column;gap:8px;
  }
  .cms-sk-rail-title{height:12px;width:72px;border-radius:4px;margin-bottom:4px}
  .cms-sk-row{height:32px;border-radius:8px}
  .cms-sk-canvas{
    flex:1;min-width:0;display:flex;flex-direction:column;align-items:center;
    justify-content:center;padding:24px;background:var(--bg);
  }
  .cms-sk-device{
    width:min(92%,720px);aspect-ratio:16/10;border-radius:12px;border:1px solid var(--border);
    background:#fff;box-shadow:0 8px 32px rgba(43,39,31,.06);padding:16px;
    display:flex;flex-direction:column;gap:10px;
  }
  .cms-sk-hero{height:28%;border-radius:8px}
  .cms-sk-block{height:12%;border-radius:6px}
  .cms-sk-inspector{
    width:280px;flex-shrink:0;border-left:1px solid var(--border);background:#fff;
    padding:14px 12px;display:flex;flex-direction:column;gap:10px;
  }
  .cms-sk-label{height:10px;width:48px;border-radius:3px}
  .cms-sk-field{height:36px;border-radius:8px}
  .cms-sk-status{
    margin-top:auto;padding:10px 14px;border-top:1px solid var(--border);
    display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted);
  }
  .cms-sk-spinner{
    width:14px;height:14px;border:2px solid var(--sk);border-top-color:var(--teal);
    border-radius:50%;animation:agentsam-spin .7s linear infinite;flex-shrink:0;
  }
  @keyframes agentsam-spin{to{transform:rotate(360deg)}}

  @media(max-width:900px){
    .cms-sk-rail,.cms-sk-inspector{display:none}
  }
</style>
</head>
<body>
<div id="app">
  <div class="cms-sk-shell" aria-busy="true" aria-label="Loading AgentSam CMS">
    <header class="cms-sk-topbar">
      <div class="sk-bar sk-shimmer" style="width:88px"></div>
      <div class="sk-bar sk-shimmer" style="width:120px;opacity:.7"></div>
      <div style="flex:1"></div>
      <div class="sk-bar sk-shimmer" style="width:56px"></div>
      <div class="sk-bar sk-shimmer" style="width:72px"></div>
      <div class="sk-bar sk-shimmer" style="width:64px;background:var(--teal);opacity:.25"></div>
    </header>
    <div class="cms-sk-body">
      <aside class="cms-sk-rail">
        <div class="cms-sk-rail-title sk-shimmer"></div>
        <div class="cms-sk-row sk-shimmer"></div>
        <div class="cms-sk-row sk-shimmer" style="opacity:.85"></div>
        <div class="cms-sk-row sk-shimmer" style="opacity:.7"></div>
        <div class="cms-sk-row sk-shimmer" style="opacity:.55"></div>
        <div class="cms-sk-row sk-shimmer" style="opacity:.4"></div>
      </aside>
      <main class="cms-sk-canvas">
        <div class="cms-sk-device">
          <div class="cms-sk-hero sk-shimmer"></div>
          <div class="cms-sk-block sk-shimmer"></div>
          <div class="cms-sk-block sk-shimmer" style="opacity:.75"></div>
          <div class="cms-sk-block sk-shimmer" style="opacity:.55;width:70%"></div>
        </div>
      </main>
      <aside class="cms-sk-inspector">
        <div class="cms-sk-label sk-shimmer"></div>
        <div class="cms-sk-field sk-shimmer"></div>
        <div class="cms-sk-label sk-shimmer" style="width:64px"></div>
        <div class="cms-sk-field sk-shimmer" style="opacity:.8"></div>
        <div class="cms-sk-field sk-shimmer" style="opacity:.6"></div>
      </aside>
    </div>
    <footer class="cms-sk-status">
      <span class="cms-sk-spinner" aria-hidden="true"></span>
      <span class="sk-pulse">Loading AgentSam CMS editor…</span>
    </footer>
  </div>
</div>
<script>
(function(){
  try {
    const p = new URLSearchParams(location.search);
    if (p.get('view') === 'themeEditor') {
      document.documentElement.classList.add('theme-editor-light');
    }
  } catch (_) {}
})();
(function(){
  try{
    const p=window.parent?.document?.documentElement;
    if(!p||p===document.documentElement)return;
    const cs=window.parent.getComputedStyle(p);
    const keys=['--bg-canvas','--bg-app','--bg-panel','--bg-hover','--bg-elevated',
      '--border-subtle','--border-focus','--text-main','--text-muted','--text-heading',
      '--solar-cyan','--solar-orange','--solar-green','--solar-blue','--solar-red',
      '--dashboard-panel','--dashboard-canvas','--dashboard-border'];
    const root=document.documentElement;
    for(const k of keys){const v=cs.getPropertyValue(k).trim();if(v)root.style.setProperty(k,v);}
    const slug=p.getAttribute('data-theme');
    if(slug)root.setAttribute('data-theme',slug);
  }catch(_){}
})();
window.addEventListener('message',function(e){
  const parentOrigin=(function(){try{return new URLSearchParams(location.search).get('parent_origin')||'';}catch(_){return '';}})();
  const allowed=[window.location.origin];
  if(parentOrigin)allowed.push(parentOrigin);
  if(!allowed.includes(e.origin))return;
  const d=e.data;
  if(!d||d.type!=='iam-cms-theme')return;
  try{
    const root=document.documentElement;
    if(d.slug)root.setAttribute('data-theme',d.slug);
    if(d.vars&&typeof d.vars==='object'){
      for(const[k,v]of Object.entries(d.vars)){if(v)root.style.setProperty(k,v);}
    }
  }catch(_){}
});
</script>
<script type="module" src="/static/dashboard/app/cms/cms-editor.js"></script>
<script>
(function () {
  const mount = document.getElementById('app');
  const showErr = (msg) => {
    if (!mount) return;
    mount.innerHTML = '<div style="padding:24px;font-family:Inter,sans-serif;color:#181611;max-width:420px">'
      + '<strong style="display:block;margin-bottom:8px">AgentSam CMS failed to load</strong>'
      + '<p style="color:#786f62;font-size:13px;line-height:1.5;margin:0">' + msg + '</p>'
      + '<p style="color:#786f62;font-size:12px;margin:12px 0 0">Try a hard refresh (Cmd+Shift+R) or sign in again.</p></div>';
  };
  window.addEventListener('error', (e) => {
    const src = e.filename || '';
    if (src.includes('cms-editor')) {
      console.error('[AgentSam CMS]', e.error || e.message);
      showErr(e.message || 'Editor bundle failed to load.');
    }
  }, true);
  window.addEventListener('unhandledrejection', (e) => {
    console.error('[AgentSam CMS]', e.reason);
    showErr(e.reason && e.reason.message ? e.reason.message : String(e.reason));
  });
})();
</script>
</body>
</html>
