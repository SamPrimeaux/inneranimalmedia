name = "inneranimalmedia"
main = "src/index.js"
compatibility_date = "2026-01-20"
compatibility_flags = ["nodejs_compat"]
workers_dev = true
preview_urls = true
no_bundle = false

# Dynamic Worker Loader (closed beta on Cloudflare; local wrangler/workerd supported).
worker_loaders = [{ binding = "LOADER" }]

[triggers]
crons = [
  "*/20 * * * *",
  "*/25 * * * *",
  "*/30 * * * *",
  "0 * * * *",
  "0 1 * * *",
  "0 0 * * *",
  "0 6 * * *",
  "0 9 * * *",
  "0 9 * * 1",
  "30 13 * * *",
  "0 0 1 * *"
]

# Build watch path exclusions are configured in the Cloudflare dashboard (not wrangler v4):
# Workers → your project → Settings → Build → Build watch paths → Exclude paths:
#   snapshot-*.json
#   docs/**
#   *.md
# Dashboard/** is excluded — frontend ships via R2 (deploy-frontend.sh), not wrangler build.

# esbuild options belong in wrangler.jsonc / per-project build config; top-level [esbuild] is not valid and triggers Wrangler warnings.

[[routes]]
pattern = "inneranimalmedia.com/*"
zone_name = "inneranimalmedia.com"

[[routes]]
pattern = "www.inneranimalmedia.com/*"
zone_name = "inneranimalmedia.com"

[[routes]]
pattern = "webhooks.inneranimalmedia.com/*"
zone_name = "inneranimalmedia.com"

[[routes]]
pattern = "studio.inneranimalmedia.com/*"
zone_name = "inneranimalmedia.com"

[ai]
binding = "AI"

# [[ai_search]]
# binding = "AI_SEARCH"
# instance_name = "iam-autorag"

[browser]
binding = "MYBROWSER"

[[r2_buckets]]
binding = "ASSETS"
bucket_name = "inneranimalmedia"
# PWA root assets (site /sw.js, /manifest.webmanifest, …) live under static/dashboard/*
# on this bucket — published each deploy by scripts/publish-pwa-r2.mjs (not wrangler build).

[[r2_buckets]]
binding = "AUTORAG_BUCKET"
bucket_name = "inneranimalmedia-autorag"

[[r2_buckets]]
binding = "ARTIFACTS"
bucket_name = "artifacts"

[[r2_buckets]]
binding = "CMS_BUCKET"
bucket_name = "cms"

# Heavy 3D / CAD GLB output — kept OFF the codebase ASSETS bucket. Served publicly
# via custom domain cad.inneranimalmedia.com (CDN-cached). See src/core/cad-job-scope.js.
[[r2_buckets]]
binding = "CAD"
bucket_name = "cad"

# iam-platform (`R2`) and `tools` buckets removed from production bindings 2026-06-02.
# Platform R2 CRUD uses registry + S3 credentials where needed (see src/api/r2-api.js).
# Email templates/archive: inneranimalmedia/email/… on ASSETS (EMAIL binding dropped 2026-06-06).
# DOCS_BUCKET (iam-docs) dropped 2026-06-06 — docs/screenshots on ASSETS / AUTORAG; S3 API for legacy bucket.

[[d1_databases]]
binding = "DB"
database_name = "inneranimalmedia-business"
database_id = "cf87b717-d4e2-4cf8-bab0-a81268e32d49"

# inneranimalmedia-supabase-hyperdrive
[[hyperdrive]]
binding = "HYPERDRIVE"
id = "08183bb9d2914e87ac8395d7e4ecff60"

# Five-lane Vectorize (1536-dim oai3large). Legacy VECTORIZE / AGENTSAMVECTORIZE bindings removed 2026-06-02.
[[vectorize]]
binding = "AGENTSAM_VECTORIZE_DOCUMENTS"
index_name = "agentsam-documents-oai3large-1536"

[[vectorize]]
binding = "AGENTSAM_VECTORIZE_COURSES"
index_name = "agentsam-courses-oai3large-1536"

[[vectorize]]
binding = "AGENTSAM_VECTORIZE_CODE"
index_name = "agentsam-codebase-oai3large-1536"

[[vectorize]]
binding = "AGENTSAM_VECTORIZE_SCHEMA"
index_name = "agentsam-schema-oai3large-1536"

[[vectorize]]
binding = "AGENTSAM_VECTORIZE_MEMORY"
index_name = "agentsam-memory-oai3large-1536"

# MovieMode / media — Gemini gemini-embedding-2 @1536 (never mix OpenAI vectors here).
[[vectorize]]
binding = "AGENTSAM_VECTORIZE_MEDIA"
index_name = "agentsam-moviemode-gemini2-1536"

# Dashboard labels: KV → MCP_TOKENS, SESSION_CACHE → production-KV_SESSIONS
[[kv_namespaces]]
binding = "KV"
id = "09438d5e4f664bf78467a15af7743c44"

[[kv_namespaces]]
binding = "SESSION_CACHE"
id = "dc87920b0a9247979a213c09df9a0234"

# MovieMode product worker — globe landing at /globe, encode lane (optional offload)
[[services]]
binding = "MOVIEMODE_SERVICE"
service = "moviemode-service"

# Python CMS pipeline — HTML/agentic prototyping (iam-cms-pipeline)
[[services]]
binding = "CMS_PIPELINE"
service = "iam-cms-pipeline"

# Durable Agent Sam workflows (iam-workflows Python Workflows)
[[services]]
binding = "IAM_WORKFLOWS"
service = "iam-workflows"

[[durable_objects.bindings]]
name = "IAM_COLLAB"
class_name = "IAMCollaborationSession"

[[durable_objects.bindings]]
name = "CHESS_SESSION"
class_name = "ChessRoom"
[[durable_objects.bindings]]
name = "AGENT_SESSION"
class_name = "AgentChatSqlV1"
[[durable_objects.bindings]]
name = "BROWSER_SESSION"
class_name = "AgentBrowserLiveV1"

# Platform sandbox container — image pushed to CF registry 2026-07-18.
[[containers]]
class_name = "MyContainer"
image = "registry.cloudflare.com/ede6590ac0d2fb7daf155b35653457b2/inneranimalmedia:latest"
instance_type = "basic"
max_instances = 10

[containers.ssh]
enabled = true

[[containers.authorized_keys]]
name = "info@inneranimals.com"
public_key = "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIHf4Xb75xQ80w255NBZ+Bn82qrMtd/iUGlqX1TcCAtff info@inneranimals.com"

[[durable_objects.bindings]]
name = "MY_CONTAINER"
class_name = "MyContainer"

# IAM_CAD_WORKER — cad-v1 pushed to CF registry 2026-07-18. CAD_DISPATCH_TARGET=auto routes here when healthy.
[[containers]]
class_name = "IamCadWorkerContainer"
image = "registry.cloudflare.com/ede6590ac0d2fb7daf155b35653457b2/meauxcontainer-cad-worker:cad-v1"
instance_type = "standard-2"
max_instances = 5

[[durable_objects.bindings]]
name = "IAM_CAD_WORKER"
class_name = "IamCadWorkerContainer"

# Dashboard label: iam-vpc
[[vpc_services]]
binding = "PTY_SERVICE"
service_id = "019db639-7c70-7071-8ef3-32ec0392a9ff"
remote = true

# ExecOS dispatcher — CAD/MCP terminal fabric (target=gcp → terminal.inneranimalmedia.com)
[[services]]
binding = "EXECOS"
service = "execos"

[[migrations]]
tag = "v1"
new_classes = ["IAMCollaborationSession"]

[[migrations]]
tag = "v2"
new_classes = ["ChessRoom"]

[[migrations]]
tag = "v4"


[[migrations]]
tag = "v5"
new_sqlite_classes = ["AgentChatSqlV1"]

[[migrations]]
tag = "v6"
# MeauxSession/IAMAgentSession/IAMSession tombstone — applied on production DO namespace previously.

[[migrations]]
tag = "v7"
new_sqlite_classes = ["AgentBrowserLiveV1"]

[[migrations]]
tag = "v8"
new_sqlite_classes = ["MyContainer"]

# v9 IamCadWorkerContainer — DO class only; container image binding enabled after container:cad-worker:build
[[migrations]]
tag = "v9"
new_sqlite_classes = ["IamCadWorkerContainer"]

[[queues.producers]]
binding = "MY_QUEUE"
queue = "74b3155b36334b69852411c083d50322"

[[queues.consumers]]
queue = "74b3155b36334b69852411c083d50322"

[[analytics_engine_datasets]]
binding = "WAE"
dataset = "inneranimalmedia"

[[pipelines]]
binding = "INNERANIMALPRO_STREAM"
pipeline = "7907f409b0d444b9a09c901fbdf05f1f"

# Plaintext vars — keep aligned with Cloudflare dashboard (see docs/platform/worker-env-production-2026-06.md).
# Secrets are dashboard-only; never commit values.
[vars]
OPENAI_API_BASE_URL = "https://api.openai.com/v1"
SUPABASE_S3_ENDPOINT = "https://dpmuvynqixblxsilnlut.storage.supabase.co/storage/v1/s3"
SUPABASE_S3_REGION = "us-east-2"
RAG_DOCUMENTS_PROJECT_ID = "inneranimalmedia"
RAG_AGENT_ID = "inneranimalmedia"
RAG_OPENAI_EMBEDDING_MODEL = "text-embedding-3-large"
AGENTSAM_OPENAI_EMBEDDING_MODEL = "text-embedding-3-large"
AGENTSAM_EMBEDDING_DIMENSIONS = "1536"
CLOUDFLARE_ACCOUNT_ID = "ede6590ac0d2fb7daf155b35653457b2"
CLOUDFLARE_IMAGES_ACCOUNT_HASH = "g7wf09fCONpnidkRnR_5vw"
GITHUB_CLIENT_ID = "Ov23li6BZYxjVtGUWibX"
GOOGLE_CLIENT_ID = "427617292678-gf3u47lpf876q7miq31hel2ms6tcr2f8.apps.googleusercontent.com"
WORKSPACE_ID = "ws_inneranimalmedia"
# Platform operator identity (override via secrets if needed; see src/core/platform-identity-constants.js)
D1_AUTH_USER_ID = "au_871d920d1233cbd1"
IAM_D1_AUTH_USER_ID = "au_871d920d1233cbd1"
IAM_SUPABASE_USER_ID = "6cbd71f8-1d57-4530-9736-9bf03be1adad"
IAM_SUPABASE_WORKSPACE_ID = "fa1f12a8-c841-4b79-a26c-d53a78b17dac"
OPERATOR_USER_EMAIL = "info@inneranimals.com"
ENVIRONMENT = "production"
CMS_R2_PUBLIC_ORIGIN = "https://cms.inneranimalmedia.com"
CAD_R2_PUBLIC_ORIGIN = "https://cad.inneranimalmedia.com"
# Meet engine: legacy (Cloudflare Calls SFU) | realtimekit (RealtimeKit SDK path)
MEET_ENGINE = "realtimekit"
AI_SEARCH_ENDPOINT = "https://2da31515-2005-42e4-9efe-a4e6a425a627.search.ai.cloudflare.com"
# CAD jobs: gcp (default) | auto (container if healthy, else GCP) | container
CAD_DISPATCH_TARGET = "auto"
CONTAINER_POOL_ID = "inneranimalmedia"
SANDBOX_R2_BUCKET_NAME = "inneranimalmedia"
IAM_SANDBOX_R2_FUSE = "1"
IAM_R2_FUSE_READONLY = "0"

[observability]

[observability.logs]
enabled = true
invocation_logs = true

[build]
command = ""

# These are Workers-native or handled via fetch — don't bundle them
[define]
"process.env.NODE_ENV" = '"production"'
